version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aipplify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nLHCxquUaKRawG25cE5EwDbiGb9r
      POSTGRES_DB: aipplify
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
